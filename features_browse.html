<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHAYNUPZINE — Feature</title>
<style>
  :root{
    --ink:#222; --muted:#666; --brand:#111; --chip:#eef1f5;
    --panel:rgba(255,255,255,.6);
    --line:#e5e7eb; --link:#2E66CC;
    --accent:#111; --danger:#a33;
  }

  html,body{
    margin:0; background:transparent; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:18px;
  }

  .bg{
    position:fixed; inset:0;
    background-color:#f3f5f7;
    background-size:cover; background-position:center;
    filter:brightness(.88); z-index:0;
  }

  .wrap{max-width:1080px; margin:28px auto; padding:0 16px;}

  .panel{
    position:relative; z-index:1;
    background:var(--panel);
    -webkit-backdrop-filter:saturate(120%) blur(10px);
    backdrop-filter:saturate(120%) blur(10px);
    border-radius:16px;
    box-shadow:0 10px 28px rgba(0,0,0,.6);
    padding:20px;
  }

  .top{display:flex; justify-content:space-between; align-items:center; gap:12px}
  .brand{display:inline-block; background:var(--brand); color:#fff; border-radius:8px; padding:7px 12px; font-weight:800; letter-spacing:.4px}

  .lang{position:fixed; top:10px; right:10px; display:flex; flex-direction:column; gap:8px; z-index:10}
  .lang button{border:1px solid #ddd; background:#fff; color:#111; border-radius:12px; padding:8px 12px; cursor:pointer; font-weight:800}
  .lang button.active{background:#111; color:#fff; border-color:#111}

  .title{font-size:26px; font-weight:800; margin:14px 0 6px}
  .meta{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px}
  .chip{background:var(--chip); border-radius:999px; padding:8px 12px; font-weight:700; font-size:14px}
  .author{color:var(--muted); font-size:14px}
  .divider{height:1px; background:var(--line); margin:14px 0}
  .para{padding:10px 0}
  .ptext{white-space:pre-wrap; line-height:1.7}
  .thumbs{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px}
  .thumbs img{width:100%; height:180px; object-fit:cover; border-radius:10px; background:#fff}
  @media (max-width:780px){ .thumbs img{height:120px} }
  .yt{position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; margin-top:10px}
  .yt iframe{position:absolute; inset:0; width:100%; height:100%; border:0}
  .tools{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:8px}
  .back a{color:var(--link); text-decoration:none; font-weight:700}
  .id{color:#999; font-size:12px}
  .alert{margin:12px 0; padding:12px; border-radius:14px; background:#ffe9e9; color:#a33; border:1px solid #f6bcbc; font-size:16px; display:none}
  .alert.show{display:block}
  .okbox{margin:12px 0; padding:12px; border-radius:14px; background:#eefcf1; color:#0a7a32; border:1px solid #c6ecd1; font-size:16px; display:none}
  .okbox.show{display:block}
  .skeleton{animation:pulse 1.1s infinite ease-in-out; background:linear-gradient(90deg,#eee,#f7f7f7,#eee); border-radius:10px}
  @keyframes pulse{0%{background-position:0% 50%}100%{background-position:100% 50%}}
  .sk-title{height:28px; margin:16px 0}
  .sk-line{height:14px; margin:8px 0}

  .content{display:grid; grid-template-columns:1fr; gap:16px}
  @media(max-width:780px){ .content{grid-template-columns:1fr} }

  .editbox{
    margin-top:14px;
    padding:14px;
    border:1px dashed #b9c1cc;
    border-radius:12px;
    background:rgba(255,255,255,.72);
  }
  .edithead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .edittitle{font-weight:800; font-size:16px}
  .editrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
  .editrow3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px}
  @media(max-width:900px){ .editrow3{grid-template-columns:1fr} }
  @media(max-width:780px){ .editrow{grid-template-columns:1fr} }

  .lab{font-size:12px; color:#666; margin:0 0 6px; font-weight:700}
  .in,.ta{
    width:100%; box-sizing:border-box; border:1px solid #d0d7de; border-radius:10px;
    padding:10px 12px; font-size:15px; background:#fff; color:#111;
  }
  .ta{min-height:110px; resize:vertical}

  .edit-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
  .btn{
    border:0; border-radius:12px; padding:10px 14px; font-weight:800; cursor:pointer; font-size:14px;
    background:#111; color:#fff;
  }
  .btn.ghost{background:#fff; color:#111; border:1px solid #d0d7de}
  .btn.warn{background:#fff0f0; color:#a33; border:1px solid #f3b9b9}
  .btn.secondary{background:#3949ab; color:#fff}

  .editpanel{display:none; margin-top:12px; border-top:1px solid #d8dee6; padding-top:12px}
  .editpanel.show{display:block}
  .smallnote{margin-top:6px; font-size:12px; color:#666}

  .sectionbox{
    border:1px solid #e3e8ef;
    border-radius:10px;
    padding:10px;
    background:#fff;
    margin-top:12px;
  }
  .sectionttl{font-weight:800; margin-bottom:8px; font-size:14px}
</style>
</head>
<body>
<div id="bg" class="bg"></div>

<div class="wrap">
  <div class="panel">
    <div class="top">
      <div>
        <span class="brand">CHAYNUPZINE</span>
      </div>
      <div class="lang">
        <button id="lang-ja" type="button">JP</button>
        <button id="lang-en" type="button">EN</button>
      </div>
    </div>

    <div class="tools" style="margin-top:6px">
      <div class="back"><a id="btn-top" href="https://etramone7-coder.github.io/chaynupzine/">← トップへ戻る</a></div>
      <div></div>
    </div>

    <div id="alert" class="alert"></div>
    <div id="okbox" class="okbox"></div>

    <div id="head">
      <div class="skeleton sk-title"></div>
      <div class="meta">
        <span class="chip skeleton" style="width:84px;height:30px"></span>
        <span class="chip skeleton" style="width:80px;height:30px"></span>
        <span class="chip skeleton" style="width:100px;height:30px"></span>
        <span class="author skeleton" style="width:160px;height:20px"></span>
      </div>
    </div>

    <div class="editbox">
      <div class="edithead">
        <div class="edittitle">投稿を編集 / 非表示 / 再表示</div>
        <div class="smallnote">このページで表示中の特集を、editキーで直接更新します。</div>
      </div>

      <div class="editrow">
        <div>
          <div class="lab">editキー</div>
          <input id="editKey" class="in" type="text" placeholder="投稿時に設定した編集キー">
        </div>
        <div>
          <div class="lab">対象情報</div>
          <input id="targetInfo" class="in" type="text" readonly placeholder="row / slug">
        </div>
      </div>

      <div class="edit-actions">
        <button id="btnEditStart" class="btn secondary" type="button">編集開始</button>
        <button id="btnSave" class="btn" type="button">保存</button>
        <button id="btnHide" class="btn warn" type="button">非表示</button>
        <button id="btnUnhide" class="btn ghost" type="button">再表示</button>
        <button id="btnCancelEdit" class="btn ghost" type="button">編集解除</button>
      </div>

      <div class="smallnote">※ この画面では画像は URL のみ編集します。ファイルアップロード差し替えは未対応です。</div>

      <div id="editPanel" class="editpanel">
        <div class="editrow">
          <div>
            <div class="lab">TITLE</div>
            <input id="e_title" class="in" type="text">
          </div>
          <div>
            <div class="lab">AUTHOR</div>
            <input id="e_author" class="in" type="text">
          </div>
        </div>

        <div class="editrow3">
          <div>
            <div class="lab">GENRE</div>
            <input id="e_genre" class="in" type="text">
          </div>
          <div>
            <div class="lab">ERA</div>
            <input id="e_era" class="in" type="text">
          </div>
          <div>
            <div class="lab">REGION</div>
            <input id="e_region" class="in" type="text">
          </div>
        </div>

        <div id="editSections"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="content">
      <div id="media" style="display:none"></div>
      <div id="body">
        <div class="sk-line skeleton"></div>
        <div class="sk-line skeleton"></div>
        <div class="sk-line skeleton"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="tools">
      <div class="back"><a id="backlink" href="#">← Back to Features</a></div>
      <div class="id" id="idhint"></div>
    </div>
  </div>
</div>

<script>
document.getElementById('bg').style.backgroundImage =
  'url(https://etramone7-coder.github.io/chaynupzine/assets/feature_browse.webp)';

function qs(k){
  var m = location.search.match(new RegExp('[?&]'+k+'=([^&]+)'));
  return m ? decodeURIComponent(m[1]) : '';
}

var _qlang = (function(){
  var q = qs('lang');
  if(q==='en' || q==='ja'){ localStorage.setItem('chay_lang', q); return q; }
  var saved = localStorage.getItem('chay_lang');
  if(saved!=='en' && saved!=='ja'){ localStorage.setItem('chay_lang','ja'); return 'ja'; }
  return saved;
})();
var curLang = _qlang;
var gFeature = null;
var gRowIndex = 0;
var gIsEditOpen = false;

var I18N = {
  ja:{
    by:'by',
    back:'← 特集一覧へ戻る',
    notFound:'対象の特集が見つかりません。',
    hidden:'この特集は非公開です。',
    top:'← トップへ戻る',
    editStart:'編集開始',
    save:'保存',
    hide:'非表示',
    unhide:'再表示',
    cancel:'編集解除',
    needKey:'editキーを入力してください。',
    noRow:'rowIndex を取得できません。',
    startEditOk:'編集欄に現在の内容を読み込みました。',
    saveOk:'保存しました。',
    hideOk:'非表示にしました。',
    unhideOk:'再表示しました。',
    fail:'処理に失敗しました。'
  },
  en:{
    by:'by',
    back:'← Back to Features',
    notFound:'Feature not found.',
    hidden:'This feature is not public.',
    top:'← Back to Top',
    editStart:'Edit',
    save:'Save',
    hide:'Hide',
    unhide:'Unhide',
    cancel:'Cancel',
    needKey:'Enter edit key.',
    noRow:'rowIndex is unavailable.',
    startEditOk:'Loaded current data into edit form.',
    saveOk:'Saved.',
    hideOk:'Hidden.',
    unhideOk:'Restored.',
    fail:'Action failed.'
  }
};

function esc(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);
  });
}

function normalizeHttps(u){
  try{
    if(!u) return '';
    if(/^https:\/\//i.test(u)) return u;
    if(/^http:\/\//i.test(u)) return u.replace(/^http:/i,'https:');
    return u;
  }catch(_){ return String(u||''); }
}

function extractDriveId(u){
  try{
    var s=String(u||'');
    var m=s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if(m) return m[1];
    m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/); if(m) return m[1];
    m=s.match(/uc\?export=view&id=([a-zA-Z0-9_-]+)/); if(m) return m[1];
  }catch(_){}
  return '';
}

function buildImageSources(url){
  url = normalizeHttps(url);
  var arr=[]; if(!url) return arr;
  if(url.indexOf('images.unsplash.com')>=0){
    arr.push(url + (url.indexOf('?')>=0 ? '&w=1200' : '?w=1200'));
    return arr;
  }
  var id=extractDriveId(url);
  if(id){
    arr.push('https://drive.google.com/thumbnail?id='+id+'&sz=w1200');
    arr.push('https://drive.google.com/uc?export=view&id='+id);
  }
  if(/^https:\/\//i.test(url)) arr.push(url);
  return arr;
}

function ytId(u){
  try{
    var s = String(u||'').trim(); if(!s) return '';
    var url = new URL(normalizeHttps(s));
    var host = url.hostname.replace(/^www\./,'');
    if(host==='youtu.be'){
      var p = url.pathname.slice(1);
      return (/^[A-Za-z0-9_-]{6,}$/.test(p)?p:'');
    }
    if(host==='youtube.com' || host==='m.youtube.com'){
      var v = url.searchParams.get('v');
      if(v && /^[A-Za-z0-9_-]{6,}$/.test(v)) return v;
      var m = url.pathname.match(/\/embed\/([A-Za-z0-9_-]{6,})/);
      if(m) return m[1];
    }
  }catch(_){}
  var m2 = String(u||'').match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);
  return m2 ? m2[1] : '';
}

function isAllowedYouTube(u){
  if(!u) return true;
  return /^(https:\/\/(?:www\.)?youtube\.com\/watch\?v=|https:\/\/youtu\.be\/)/i.test(String(u).trim());
}

function chip(text){
  var s=document.createElement('span');
  s.className='chip';
  s.textContent=text;
  return s;
}

const _enCache = new Map();
async function ja2en(s){
  const key=(s||'').trim(); if(!key) return '';
  if(_enCache.has(key)) return _enCache.get(key);
  try{
    const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q='+encodeURIComponent(key),{cache:'no-store'});
    const j=await r.json();
    const out=(j&&j[0]) ? j[0].map(function(x){ return x[0]; }).join('') : key;
    _enCache.set(key,out);
    return out;
  }catch(_){
    _enCache.set(key,key);
    return key;
  }
}

function applyLang(){
  var t = (curLang==='ja'?I18N.ja:I18N.en);
  document.getElementById('backlink').textContent = t.back;
  document.getElementById('btn-top').textContent = t.top;
  document.getElementById('lang-ja').classList.toggle('active', curLang==='ja');
  document.getElementById('lang-en').classList.toggle('active', curLang==='en');
  document.getElementById('btnEditStart').textContent = t.editStart;
  document.getElementById('btnSave').textContent = t.save;
  document.getElementById('btnHide').textContent = t.hide;
  document.getElementById('btnUnhide').textContent = t.unhide;
  document.getElementById('btnCancelEdit').textContent = t.cancel;
}

async function rerender(){
  if(!gFeature) return;
  await renderHeader(gFeature);
  await renderBody(gFeature);
}

(function resolveExecUrl(){
  try{
    var injected = (window.EXEC_URL||'<?= EXEC_URL ?>'||'').trim();
    if (!injected || injected.indexOf('<?=')===0) injected = '';
    var fallback='https://script.google.com/macros/s/AKfycbznOw5AqZl9NqA1JvCgZqVI5HmmlIXTWG59CTuRO81s47lwzijy7XDAFOk7SpTQl76HZw/exec';
    window.EXEC_URL = injected || fallback;
  }catch(_){
    window.EXEC_URL='https://script.google.com/macros/s/AKfycbznOw5AqZl9NqA1JvCgZqVI5HmmlIXTWG59CTuRO81s47lwzijy7XDAFOk7SpTQl76HZw/exec';
  }
})();

async function callGetFeatureById(arg, onOK, onNG){
  try{
    if(window.google && google.script && google.script.run){
      google.script.run.withSuccessHandler(onOK).withFailureHandler(onNG).getFeatureById(arg);
      return;
    }
  }catch(_){}
  try{
    const url1 = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0?'&':'?')
      + 'fn=getFeatureById&payload=' + encodeURIComponent(JSON.stringify(arg))
      + '&v=' + Date.now();
    const r1 = await fetch(url1,{method:'GET',mode:'cors',cache:'no-store'});
    const ct = r1.headers.get('content-type')||'';
    if(r1.ok && ct.indexOf('application/json')>=0){
      onOK(await r1.json());
      return;
    }
  }catch(_){}
  try{
    const url2 = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0?'&':'?') + 'v=' + Date.now();
    const r2 = await fetch(url2,{
      method:'POST',mode:'cors',cache:'no-store',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({fn:'getFeatureById',payload:arg,csrf:(window.__CZ_CSRF||'')})
    });
    if(!r2.ok){ throw new Error('HTTP '+r2.status); }
    onOK(await r2.json());
  }catch(err){
    onNG(err);
  }
}

async function callEditEntry(payload, onOK, onNG){
  try{
    if(window.google && google.script && google.script.run){
      google.script.run.withSuccessHandler(onOK).withFailureHandler(onNG).editEntry(payload);
      return;
    }
  }catch(_){}
  try{
    const url = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0?'&':'?') + 'v=' + Date.now();
    const r = await fetch(url,{
      method:'POST',
      mode:'cors',
      cache:'no-store',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({fn:'editEntry',payload:payload,csrf:(window.__CZ_CSRF||'')})
    });
    if(!r.ok){
      const t = await r.text().catch(function(){ return ''; });
      throw new Error('HTTP '+r.status+' '+t);
    }
    onOK(await r.json());
  }catch(err){
    onNG(err);
  }
}

async function renderHeader(data){
  var head = document.getElementById('head');
  head.innerHTML = '';

  var title = document.createElement('div');
  title.className='title';
  var titleText = data.title || '(No title)';
  if(curLang==='en' && titleText){ titleText = await ja2en(titleText); }
  title.innerHTML = esc(titleText);
  head.appendChild(title);

  var meta = document.createElement('div');
  meta.className='meta';
  if(data.genre){ meta.appendChild(chip(String(data.genre))); }
  if(data.era){ meta.appendChild(chip(String(data.era))); }
  if(data.region){ meta.appendChild(chip(String(data.region))); }

  var author = document.createElement('span');
  author.className='author';
  author.textContent = (I18N[curLang].by + ' ' + (data.author||''));
  meta.appendChild(author);
  head.appendChild(meta);
}

async function renderBody(data){
  var body = document.getElementById('body');
  body.innerHTML='';

  var any=false;
  for(var i=1;i<=5;i++){
    var text = data['para'+i+'_text'] || '';
    var yt   = data['youtube'+i] || '';
    var imgs = [];
    for(var j=1;j<=3;j++){
      var u = data['p'+i+'_img'+j+'_url'];
      if(u) imgs.push(u);
    }
    if(!text && !imgs.length && !yt) continue;
    any=true;

    var sec = document.createElement('div');
    sec.className='para';

    if(text){
      if(curLang==='en'){ text = await ja2en(text); }
      var p = document.createElement('div');
      p.className='ptext';
      p.textContent = text;
      sec.appendChild(p);
    }

    if(imgs.length){
      var t = document.createElement('div');
      t.className='thumbs';
      imgs.forEach(function(u){
        var srcs = buildImageSources(u||'');
        if(srcs.length){
          var img = document.createElement('img');
          img.loading='lazy';
          img.decoding='async';
          img.alt='image';
          var k=0;
          function next(){ if(k>=srcs.length){ return; } img.src=srcs[k++]; }
          img.onerror=next;
          next();
          t.appendChild(img);
        }
      });
      sec.appendChild(t);
    }

    if(yt){
      var id = ytId(yt);
      if(id){
        var y = document.createElement('div');
        y.className='yt';
        var ifr = document.createElement('iframe');
        ifr.loading='lazy';
        ifr.src='https://www.youtube.com/embed/'+id;
        ifr.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        ifr.setAttribute('allowfullscreen','');
        y.appendChild(ifr);
        sec.appendChild(y);
      }
    }

    body.appendChild(sec);
  }

  if(!any){
    body.innerHTML = '<div class="ptext" style="color:#888">—</div>';
  }
}

function showErrorText(msg){
  var a = document.getElementById('alert');
  a.textContent = msg || 'Error';
  a.className='alert show';
  document.getElementById('okbox').className='okbox';
}

function showError(msgKey){
  showErrorText(I18N[curLang][msgKey] || 'Error');
}

function showOkText(msg){
  var o = document.getElementById('okbox');
  o.textContent = msg || '';
  o.className = 'okbox show';
  document.getElementById('alert').className='alert';
}

function clearBanners(){
  document.getElementById('alert').className='alert';
  document.getElementById('okbox').className='okbox';
}

function backUrl(){
  return './search_features.html';
}

function buildEditSections(data){
  var host = document.getElementById('editSections');
  host.innerHTML = '';

  for(var i=1;i<=5;i++){
    var box = document.createElement('div');
    box.className = 'sectionbox';

    var ttl = document.createElement('div');
    ttl.className = 'sectionttl';
    ttl.textContent = '§' + i;
    box.appendChild(ttl);

    var textLab = document.createElement('div');
    textLab.className = 'lab';
    textLab.textContent = '本文';
    box.appendChild(textLab);

    var ta = document.createElement('textarea');
    ta.className = 'ta';
    ta.id = 'e_para' + i + '_text';
    ta.value = data['para'+i+'_text'] || '';
    box.appendChild(ta);

    var ytLab = document.createElement('div');
    ytLab.className = 'lab';
    ytLab.style.marginTop = '10px';
    ytLab.textContent = 'YouTube URL';
    box.appendChild(ytLab);

    var yt = document.createElement('input');
    yt.className = 'in';
    yt.type = 'text';
    yt.id = 'e_youtube' + i;
    yt.value = data['youtube'+i] || '';
    box.appendChild(yt);

    for(var j=1;j<=3;j++){
      var il = document.createElement('div');
      il.className = 'lab';
      il.style.marginTop = '10px';
      il.textContent = '画像URL ' + j;
      box.appendChild(il);

      var inp = document.createElement('input');
      inp.className = 'in';
      inp.type = 'text';
      inp.id = 'e_p' + i + '_img' + j + '_url';
      inp.value = data['p'+i+'_img'+j+'_url'] || '';
      box.appendChild(inp);
    }

    host.appendChild(box);
  }
}

function fillEditForm(data){
  document.getElementById('e_title').value = data.title || '';
  document.getElementById('e_author').value = data.author || '';
  document.getElementById('e_genre').value = data.genre || '';
  document.getElementById('e_era').value = data.era || '';
  document.getElementById('e_region').value = data.region || '';
  buildEditSections(data);
  document.getElementById('editPanel').classList.add('show');
  gIsEditOpen = true;
}

function clearEditForm(){
  document.getElementById('e_title').value = '';
  document.getElementById('e_author').value = '';
  document.getElementById('e_genre').value = '';
  document.getElementById('e_era').value = '';
  document.getElementById('e_region').value = '';
  document.getElementById('editSections').innerHTML = '';
  document.getElementById('editPanel').classList.remove('show');
  gIsEditOpen = false;
}

function collectPatch(){
  var patch = {
    title: (document.getElementById('e_title').value || '').trim(),
    author: (document.getElementById('e_author').value || '').trim(),
    genre: (document.getElementById('e_genre').value || '').trim(),
    era: (document.getElementById('e_era').value || '').trim(),
    region: (document.getElementById('e_region').value || '').trim()
  };

  if(gFeature && gFeature.slug){
    patch.slug = gFeature.slug;
  }
  if(gFeature && Object.prototype.hasOwnProperty.call(gFeature, 'genre_other')){
    patch.genre_other = gFeature.genre_other || '';
  }
  patch.status = (gFeature && gFeature.status) ? gFeature.status : 'published';

  for(var i=1;i<=5;i++){
    patch['para'+i+'_text'] = ((document.getElementById('e_para'+i+'_text') || {}).value || '').trim();
    patch['youtube'+i] = ((document.getElementById('e_youtube'+i) || {}).value || '').trim();
    for(var j=1;j<=3;j++){
      patch['p'+i+'_img'+j+'_url'] = ((document.getElementById('e_p'+i+'_img'+j+'_url') || {}).value || '').trim();
    }
  }

  return patch;
}

function validatePatch(patch){
  Object.keys(patch).forEach(function(k){
    if(/^p\d+_img\d+_url$/.test(k) && patch[k]){
      if(!/^https:\/\//i.test(String(patch[k]).trim())){
        throw new Error('画像URLは https のみ対応です: ' + k);
      }
    }
    if(/^youtube\d+$/.test(k) && patch[k]){
      if(!isAllowedYouTube(String(patch[k]).trim())){
        throw new Error('YouTube URL が無効です: ' + k);
      }
    }
  });
}

function refreshTargetInfo(){
  var target = document.getElementById('targetInfo');
  target.value = gRowIndex ? ('row=' + gRowIndex + (gFeature && gFeature.slug ? ' / slug=' + gFeature.slug : '')) : '';
}

(function init(){
  applyLang();
  document.getElementById('lang-ja').onclick = async function(){
    curLang='ja';
    localStorage.setItem('chay_lang','ja');
    applyLang();
    await rerender();
  };
  document.getElementById('lang-en').onclick = async function(){
    curLang='en';
    localStorage.setItem('chay_lang','en');
    applyLang();
    await rerender();
  };
  document.getElementById('backlink').href = backUrl();

  document.getElementById('btnEditStart').onclick = function(){
    clearBanners();
    if(!gFeature){
      showError('notFound');
      return;
    }
    fillEditForm(gFeature);
    showOkText(I18N[curLang].startEditOk);
  };

  document.getElementById('btnCancelEdit').onclick = function(){
    clearBanners();
    clearEditForm();
  };

  document.getElementById('btnSave').onclick = function(){
    clearBanners();
    var key = (document.getElementById('editKey').value || '').trim();
    if(!key){
      showErrorText(I18N[curLang].needKey);
      return;
    }
    if(!gRowIndex){
      showErrorText(I18N[curLang].noRow);
      return;
    }
    if(!gIsEditOpen){
      fillEditForm(gFeature || {});
      showOkText(I18N[curLang].startEditOk);
      return;
    }

    try{
      var patch = collectPatch();
      validatePatch(patch);

      callEditEntry({
        sheetName:'Features',
        rowIndex:gRowIndex,
        edit_key:key,
        action:'update',
        patch:patch
      }, async function(res){
        if(!res || !res.ok){
          showErrorText((res && res.error) ? res.error : I18N[curLang].fail);
          return;
        }

        Object.assign(gFeature, patch);
        await rerender();
        fillEditForm(gFeature);
        showOkText(I18N[curLang].saveOk);
      }, function(err){
        showErrorText(err && err.message ? err.message : I18N[curLang].fail);
      });
    }catch(e){
      showErrorText(e && e.message ? e.message : I18N[curLang].fail);
    }
  };

  document.getElementById('btnHide').onclick = function(){
    clearBanners();
    var key = (document.getElementById('editKey').value || '').trim();
    if(!key){
      showErrorText(I18N[curLang].needKey);
      return;
    }
    if(!gRowIndex){
      showErrorText(I18N[curLang].noRow);
      return;
    }

    callEditEntry({
      sheetName:'Features',
      rowIndex:gRowIndex,
      edit_key:key,
      action:'delete'
    }, function(res){
      if(!res || !res.ok){
        showErrorText((res && res.error) ? res.error : I18N[curLang].fail);
        return;
      }
      showOkText(I18N[curLang].hideOk);
    }, function(err){
      showErrorText(err && err.message ? err.message : I18N[curLang].fail);
    });
  };

  document.getElementById('btnUnhide').onclick = function(){
    clearBanners();
    var key = (document.getElementById('editKey').value || '').trim();
    if(!key){
      showErrorText(I18N[curLang].needKey);
      return;
    }
    if(!gRowIndex){
      showErrorText(I18N[curLang].noRow);
      return;
    }

    callEditEntry({
      sheetName:'Features',
      rowIndex:gRowIndex,
      edit_key:key,
      action:'restore'
    }, function(res){
      if(!res || !res.ok){
        showErrorText((res && res.error) ? res.error : I18N[curLang].fail);
        return;
      }
      showOkText(I18N[curLang].unhideOk);
    }, function(err){
      showErrorText(err && err.message ? err.message : I18N[curLang].fail);
    });
  };

  var row = qs('row');
  var slug = qs('slug');

  callGetFeatureById(
    row ? { rowIndex:Number(row)||0 } : (slug ? { slug:String(slug) } : { rowIndex:0 }),
    function(res){
      try{
        if(!res || !res.ok || !res.data){
          showError('notFound');
          return;
        }
        var d = res.data || {};
        gFeature = d;
        gRowIndex = Number(res.rowIndex || d.rowIndex || row || 0);

        var st = String(d.status||'').toLowerCase();
        if(st && st!=='published'){
          showError('hidden');
        }

        rerender();
        var idhint = document.getElementById('idhint');
        idhint.textContent = d.slug ? ('slug: '+d.slug+' / row: '+(gRowIndex||'')) : ('row: '+(gRowIndex||''));
        refreshTargetInfo();
      }catch(_){
        showError('notFound');
      }
    },
    function(){
      showError('notFound');
    }
  );
})();
</script>
</body>
</html>
