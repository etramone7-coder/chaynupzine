<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CHAYNUPZINE — Record View</title>
<style>
  :root{
    --ink:#222;
    --panel:rgba(255,255,255,.72);
    --ok-bg:#eefcf1;
    --ok-bd:#c6ecd1;
    --ok-fg:#0a7a32;
    --ng-bg:#ffe9e9;
    --ng-bd:#f6bcbc;
    --ng-fg:#a33;
  }
  html,body{
    margin:0;
    background:transparent;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:20px;
    line-height:1.5;
    max-width:100%;
    overflow-x:hidden;
  }
  .bg{
    position:fixed;
    inset:0;
    background-color:#f3f5f7;
    background-image:url("https://etramone7-coder.github.io/chaynupzine/assets/bg_records.webp");
    background-size:cover;
    background-position:center;
    filter:brightness(.88);
    z-index:0;
  }

  .wrap{
    max-width:1080px;
    margin:28px auto;
    padding:0 16px;
  }
  .panel{
    position:relative;
    z-index:1;
    background:var(--panel);
    backdrop-filter:saturate(120%) blur(10px);
    border-radius:16px;
    box-shadow:0 10px 28px rgba(0,0,0,.35);
    padding:20px;
    min-height:720px;
    content-visibility:auto;
    contain-intrinsic-size:1000px;
  }

  .topbar{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  .top-left{
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-start;
  }
  .brand{
    background:#111;
    color:#fff;
    border-radius:8px;
    padding:7px 12px;
    font-weight:800;
    font-size:clamp(16px,5.2vw,22px);
  }

  .btn{
    border:0;
    border-radius:14px;
    padding:10px 14px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
  }
  .btn.ghost{
    background:#fff;
    color:#111;
    border:1px solid #ddd;
  }
  .btn.warn{
    background:#fff0f0;
    color:#a33;
    border:1px solid #f3b9b9;
  }
  .btn.secondary{
    background:#3949ab;
    color:#fff;
  }

  .grid{
    display:grid;
    gap:18px;
    margin-top:16px;
  }
  @media(min-width:980px){
    .grid{ grid-template-columns:420px 1fr; }
  }

  .leftbox{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .jacket{
    width:100%;
    aspect-ratio:1/1;
    border-radius:14px;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    color:#888;
  }
  .jacket img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .ytwrap{
    position:relative;
    width:100%;
    padding-top:56.25%;
    border-radius:14px;
    overflow:hidden;
    background:#000;
  }
  #ytPlaceholder{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  #ytPlaceholder img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  #ytPlaceholder .playbtn{
    position:absolute;
    width:68px;
    height:48px;
    border-radius:12px;
    background:rgba(0,0,0,.6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    color:#fff;
    font-size:18px;
  }

  .head{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-start;
  }
  .title{ min-width:0; }
  .band{
    font-size:26px;
    font-weight:900;
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track{
    font-size:20px;
    color:#444;
    margin:4px 0 0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .badge{
    padding:8px 12px;
    border-radius:999px;
    font-size:16px;
    font-weight:800;
    align-self:flex-start;
  }

  .meta{
    display:grid;
    gap:8px;
    margin:10px 0 0;
  }
  .kv{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .k{
    font-weight:800;
    color:#555;
    min-width:7em;
  }
  .v{ color:#222; }

  .desc{
    margin-top:14px;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .author{
    margin-top:10px;
    color:#555;
    word-break:break-word;
  }
  .actions{
    display:flex;
    gap:10px;
    margin-top:16px;
    flex-wrap:wrap;
  }

  .alert{
    margin-top:14px;
    padding:12px;
    border-radius:12px;
    border:1px solid #e6e6e6;
    background:#fff;
    font-size:16px;
    display:none;
    word-break:break-word;
  }
  .alert.show{ display:block; }

  h1{
    font-size:clamp(18px,4.6vw,24px);
    margin:0;
  }
  #subtitle{
    white-space:nowrap;
    font-size:16px;
    color:#555;
  }

  .toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .in{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:8px 10px;
    font-size:16px;
    width:100%;
    box-sizing:border-box;
  }
  #editPanel{
    display:none;
    margin-top:10px;
    border:1px dashed #ddd;
    background:#fff;
    padding:10px;
    border-radius:12px;
  }
  .row2{
    display:grid;
    gap:10px;
  }
  @media(min-width:720px){
    .row2{ grid-template-columns:1fr 1fr; }
  }
  .lab{
    font-size:14px;
    color:#555;
    font-weight:800;
    margin-top:6px;
  }
  .ta{
    min-height:120px;
    white-space:pre-wrap;
    resize:vertical;
  }

  .debug{
    margin-top:16px;
    padding:12px;
    border:1px dashed #bbb;
    border-radius:12px;
    background:rgba(255,255,255,.8);
    font-size:13px;
    line-height:1.4;
    white-space:pre-wrap;
    word-break:break-word;
  }
</style>
</head>
<body>
<div id="bg" class="bg"></div>

<div class="wrap">
  <div class="panel">
    <div class="topbar">
      <div class="top-left">
        <h1>
          <span class="brand">CHAYNUPZINE</span>
          <span id="subtitle">Record view</span>
        </h1>
        <button id="btn-back" class="btn ghost" aria-label="検索へ戻る">検索へ戻る</button>
        <a class="btn ghost" id="btn-home" href="https://etramone7-coder.github.io/chaynupzine/" target="_top" rel="noopener noreferrer" aria-label="トップへ戻る">トップへ戻る</a>
      </div>
    </div>

    <div class="grid">
      <div class="leftbox">
        <div class="jacket" id="jacketBox">No image</div>
        <div class="ytwrap" id="ytWrap" style="display:none">
          <div id="ytPlaceholder" aria-label="Play YouTube"></div>
        </div>
      </div>

      <div>
        <div class="head">
          <div class="title">
            <h2 class="band" id="band">(Band)</h2>
            <div class="track" id="track">(Track)</div>
          </div>
          <div class="badge" id="genreBadge">GENRE</div>
        </div>

        <div class="meta">
          <div class="kv"><div class="k" id="label-genre">ジャンル</div><div class="v" id="genre">-</div></div>
          <div class="kv"><div class="k" id="label-era">年代</div><div class="v" id="era">-</div></div>
          <div class="kv"><div class="k" id="label-catalog">型番</div><div class="v" id="catalog">-</div></div>
          <div class="kv"><div class="k" id="label-format">フォーマット</div><div class="v" id="format">-</div></div>
        </div>

        <div class="desc" id="description"></div>
        <div class="author" id="author"></div>

        <div class="actions">
          <button class="btn warn" id="reportBtn" type="button" aria-label="この投稿を通報">通報する</button>
        </div>
        <div id="msg" class="alert"></div>

        <div class="toolbar">
          <span id="tool-cap">投稿を編集/削除</span>
          <button id="btnEdit" class="btn" type="button">編集</button>
          <span id="editControls" style="display:none;align-items:center;gap:8px">
            <input id="editKey" class="in" type="text" placeholder="編集キー">
            <button id="btnHide" class="btn" type="button">非表示</button>
            <button id="btnUnhide" class="btn secondary" type="button">再表示</button>
          </span>
          <span id="editMsg" class="alert"></span>
        </div>

        <div id="editPanel"></div>

        <div id="debugBox" class="debug" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  document.getElementById('bg').style.backgroundImage =
    'url(https://etramone7-coder.github.io/chaynupzine/assets/bg_records.webp)';
})();

var GENRE_STYLES = {
  Punk:{bg:'#111',fg:'#fff'},
  Hardcore:{bg:'#b00020',fg:'#fff'},
  PowerPop:{bg:'#ffd54f',fg:'#111'},
  Indie:{bg:'#4fc3f7',fg:'#111'},
  Garage:{bg:'#8d6e63',fg:'#fff'},
  Mods:{bg:'#607d8b',fg:'#fff'},
  NeoMods:{bg:'#26a69a',fg:'#fff'},
  Metal:{bg:'#424242',fg:'#fff'},
  HardRock:{bg:'#6d4c41',fg:'#fff'},
  Reggae:{bg:'#2e7d32',fg:'#fff'},
  Rock:{bg:'#3949ab',fg:'#fff'},
  Glam:{bg:'#9c27b0',fg:'#fff'},
  Pop:{bg:'#f06292',fg:'#fff'},
  Melodicore:{bg:'#ef6c00',fg:'#fff'},
  Rockabilly:{bg:'#7e57c2',fg:'#fff'},
  Other:{bg:'#9e9e9e',fg:'#fff'}
};

var LABELS = {
  subtitle:'Record view',
  genre:'ジャンル',
  era:'年代',
  catalog:'型番',
  format:'フォーマット',
  report:'通報する',
  back:'検索へ戻る',
  home:'トップへ戻る',
  by:'投稿者：',
  editCap:'投稿を編集/削除',
  edit:'編集',
  hide:'非表示',
  unhide:'再表示',
  keyPh:'編集キー',
  ok:'完了しました',
  fail:'失敗しました',
  needKey:'編集キーを入力してください',
  editGuide:'※必要な項目だけ編集できます。',
  save:'保存'
};

var currentRecord = null;
var currentRow = 0;
var DEBUG = true;

function debugLog(title, value){
  if(!DEBUG) return;
  var box = document.getElementById('debugBox');
  if(!box) return;
  box.style.display = 'block';
  var line = '--- ' + title + ' ---\n';
  try{
    line += (typeof value === 'string') ? value : JSON.stringify(value, null, 2);
  }catch(_){
    line += String(value);
  }
  line += '\n\n';
  box.textContent = line + box.textContent;
}

function setAlertState(el, text, ok){
  if(!el) return;
  el.className = 'alert show';
  el.textContent = text || '';
  if(ok){
    el.style.background = 'var(--ok-bg)';
    el.style.borderColor = 'var(--ok-bd)';
    el.style.color = 'var(--ok-fg)';
  }else{
    el.style.background = 'var(--ng-bg)';
    el.style.borderColor = 'var(--ng-bd)';
    el.style.color = 'var(--ng-fg)';
  }
}

function setUI(){
  document.getElementById('subtitle').textContent = LABELS.subtitle;
  document.getElementById('label-genre').textContent = LABELS.genre;
  document.getElementById('label-era').textContent = LABELS.era;
  document.getElementById('label-catalog').textContent = LABELS.catalog;
  document.getElementById('label-format').textContent = LABELS.format;
  document.getElementById('reportBtn').textContent = LABELS.report;
  document.getElementById('btn-back').textContent = LABELS.back;
  document.getElementById('btn-home').textContent = LABELS.home;
  document.getElementById('tool-cap').textContent = LABELS.editCap;
  document.getElementById('btnEdit').textContent = LABELS.edit;
  document.getElementById('btnHide').textContent = LABELS.hide;
  document.getElementById('btnUnhide').textContent = LABELS.unhide;

  var ek = document.getElementById('editKey');
  if(ek) ek.placeholder = LABELS.keyPh;
}

(function setupBackButton(){
  document.getElementById('btn-back').addEventListener('click', function(){
    var cameFromSearch = document.referrer && /search_records\.html(\?|$)/.test(document.referrer);
    if (cameFromSearch && history.length > 1){
      history.back();
    } else {
      location.href = 'search_records.html';
    }
  });
})();

function normalizeHttps(u){
  try{
    if(!u) return '';
    if(/^https:\/\//i.test(u)) return u;
    if(/^http:\/\//i.test(u)) return u.replace(/^http:/i,'https:');
    return u;
  }catch(_){
    return String(u||'');
  }
}

function extractDriveId(u){
  try{
    var s = String(u||'');
    var m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(m) return m[1];
    m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if(m) return m[1];
    m = s.match(/uc\?export=view&id=([a-zA-Z0-9_-]+)/);
    if(m) return m[1];
  }catch(_){}
  return '';
}

function buildImageSources(url){
  url = normalizeHttps(url);
  var arr = [];
  if(!url) return arr;
  var id = extractDriveId(url);
  if(id){
    arr.push('https://drive.google.com/uc?export=view&id=' + id);
    arr.push('https://drive.google.com/thumbnail?id=' + id + '&sz=w900');
  }
  if(/^https:\/\//i.test(url)) arr.push(url);
  return arr;
}

function setJacket(url){
  var box = document.getElementById('jacketBox');
  box.innerHTML = '';
  var srcs = buildImageSources(url);
  if(!srcs.length){
    box.textContent = 'No image';
    return;
  }
  var img = new Image();
  var i = 0;
  img.loading = 'lazy';
  function next(){
    if(i >= srcs.length){
      box.textContent = 'No image';
      return;
    }
    img.src = srcs[i++];
  }
  img.onerror = next;
  next();
  box.appendChild(img);
}

function extractYouTubeId(u){
  u = String(u || '');
  if(!u) return '';
  var m = u.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : '';
}

function setYouTube(u){
  var wrap = document.getElementById('ytWrap');
  var ph = document.getElementById('ytPlaceholder');
  wrap.style.display = 'none';
  ph.innerHTML = '';

  var id = extractYouTubeId(u||'');
  if(!id) return;

  wrap.style.display = '';
  var doThumb = function(){
    var thumb = 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
    ph.innerHTML = '<img src="' + thumb + '" alt="YouTube thumbnail"><div class="playbtn">▶</div>';
  };
  if ('requestIdleCallback' in window){
    requestIdleCallback(doThumb, {timeout:500});
  } else {
    doThumb();
  }

  ph.onclick = function(){
    ph.remove();
    var ifr = document.createElement('iframe');
    ifr.src = 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1&autoplay=1';
    ifr.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
    ifr.setAttribute('allowfullscreen','');
    ifr.style.position = 'absolute';
    ifr.style.inset = '0';
    ifr.style.width = '100%';
    ifr.style.height = '100%';
    ifr.style.border = '0';
    wrap.appendChild(ifr);
  };
}

function render(rec){
  currentRecord = rec || {};
  debugLog('render currentRecord', currentRecord);

  document.getElementById('band').textContent  = currentRecord.band || '(Band)';
  document.getElementById('track').textContent = currentRecord.track || '(Track)';

  var g = currentRecord.genre || 'Other';
  document.getElementById('genre').textContent = g;

  var style = GENRE_STYLES[g] || GENRE_STYLES.Other;
  var badge = document.getElementById('genreBadge');
  badge.textContent = g;
  badge.style.background = style.bg;
  badge.style.color = style.fg;

  var era = '';
  var yr = String(currentRecord.release_year || '').match(/(\d{4})/);
  if(yr){
    var y = parseInt(yr[1], 10);
    if(!isNaN(y)) era = (Math.floor(y / 10) * 10) + 's';
  }

  document.getElementById('era').textContent = era || '-';
  document.getElementById('catalog').textContent = currentRecord.catalog_no || '-';
  document.getElementById('format').textContent  = currentRecord.format || '-';
  document.getElementById('description').textContent = currentRecord.description || '';
  document.getElementById('author').textContent = currentRecord.author ? (LABELS.by + currentRecord.author) : '';

  setJacket(currentRecord.image_url || '');
  setYouTube(currentRecord.youtube_url || '');
}

function persistCurrentRecord(row){
  try{
    sessionStorage.setItem(
      'cz_selected_record',
      JSON.stringify(Object.assign({__row:row}, currentRecord || {}))
    );
  }catch(_){}
}

function ensureClientId(){
  try{
    var k = 'chaynup_cid';
    var v = localStorage.getItem(k);
    if(!v){
      v = 'cid_' + Math.random().toString(36).slice(2);
      localStorage.setItem(k, v);
    }
    return v;
  }catch(_){
    return '';
  }
}

(function resolveExecUrl(){
  try{
    var viaQuery = new URL(location.href).searchParams.get('exec') || '';
    var fallback = 'https://script.google.com/macros/s/AKfycbznOw5AqZl9NqA1JvCgZqVI5HmmlIXTWG59CTuRO81s47lwzijy7XDAFOk7SpTQl76HZw/exec';
    window.EXEC_URL = (viaQuery || fallback);
  }catch(_){
    window.EXEC_URL = 'https://script.google.com/macros/s/AKfycbznOw5AqZl9NqA1JvCgZqVI5HmmlIXTWG59CTuRO81s47lwzijy7XDAFOk7SpTQl76HZw/exec';
  }
  debugLog('EXEC_URL', window.EXEC_URL);
})();

async function fetchRecordByRow(row){
  if(!window.EXEC_URL) throw new Error('EXEC_URL missing');

  try{
    var url1 = window.EXEC_URL
      + (window.EXEC_URL.indexOf('?')>=0 ? '&' : '?')
      + 'fn=getRecordByRow&payload=' + encodeURIComponent(JSON.stringify({rowIndex:Number(row)}))
      + '&v=' + Date.now();

    debugLog('fetchRecordByRow GET url', url1);

    var r1 = await fetch(url1, {method:'GET', mode:'cors', cache:'no-store'});
    var ctype = (r1.headers && r1.headers.get && r1.headers.get('content-type')) || '';
    if (r1.ok && ctype.indexOf('application/json') >= 0){
      var j1 = await r1.json();
      debugLog('fetchRecordByRow GET res', j1);
      return j1;
    }
  }catch(e){
    debugLog('fetchRecordByRow GET err', String(e));
  }

  var url2 = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0 ? '&' : '?') + 'v=' + Date.now();
  var body = {
    fn:'getRecordByRow',
    payload:{rowIndex:Number(row)},
    csrf:(window.__CZ_CSRF||'')
  };

  debugLog('fetchRecordByRow POST url', url2);
  debugLog('fetchRecordByRow POST body', body);

  var r2 = await fetch(url2, {
    method:'POST',
    mode:'cors',
    cache:'no-store',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  });
  if(!r2.ok) throw new Error('HTTP ' + r2.status);
  var j2 = await r2.json();
  debugLog('fetchRecordByRow POST res', j2);
  return j2;
}

async function postEditFallback(payload){
  var url = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0 ? '&' : '?') + 'v=' + Date.now();
  var body = {
    fn:'editEntry',
    payload:payload,
    csrf:(window.__CZ_CSRF||'')
  };

  debugLog('postEditFallback url', url);
  debugLog('postEditFallback body', body);

  var r = await fetch(url, {
    method:'POST',
    mode:'cors',
    cache:'no-store',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  var j = await r.json();
  debugLog('postEditFallback res', j);
  return j;
}

async function postReportFallback(payload){
  var url = window.EXEC_URL + (window.EXEC_URL.indexOf('?')>=0 ? '&' : '?') + 'v=' + Date.now();
  var r = await fetch(url, {
    method:'POST',
    mode:'cors',
    cache:'no-store',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({
      fn:'submitReport',
      payload:payload,
      csrf:(window.__CZ_CSRF||'')
    })
  });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

function reportThis(rowIndex){
  var reason = prompt('通報理由を入力してください（例：権利侵害、スパム等）');
  if(!reason) return;

  var msg = document.getElementById('msg');
  setAlertState(msg, '通報送信中…', true);

  function done(res){
    if(res && res.ok){
      if(res.autoHidden){
        setAlertState(msg, '通報を受け付けました（累計閾値に達したため自動的に非表示になりました）。', true);
      }else{
        setAlertState(msg, '通報を受け付けました。ご協力ありがとうございます。', true);
      }
    }else{
      setAlertState(msg, '通報に失敗しました：' + (res && res.error || 'unknown'), false);
    }
  }

  function fail(err){
    setAlertState(msg, '通報に失敗しました：' + (err && err.message ? err.message : String(err)), false);
  }

  try{
    if (window.google && google.script && google.script.run){
      google.script.run
        .withSuccessHandler(done)
        .withFailureHandler(fail)
        .submitReport({
          sheetName:'Records',
          rowIndex:Number(rowIndex),
          reason:reason,
          client_id:ensureClientId()
        });
    }else{
      postReportFallback({
        sheetName:'Records',
        rowIndex:Number(rowIndex),
        reason:reason,
        client_id:ensureClientId()
      }).then(done).catch(fail);
    }
  }catch(e){
    fail(e);
  }
}

function openEditPanel(){
  document.getElementById('editControls').style.display = 'inline-flex';
  document.getElementById('editPanel').style.display = 'block';
  ensureEditPanel(true);
}

function showEditMessage(text, ok){
  setAlertState(document.getElementById('editMsg'), text, ok);
}

async function reloadAndRender(rowIndex){
  var res = await fetchRecordByRow(rowIndex);
  if(!res || !res.ok || !res.data) throw new Error('reload failed');
  render(res.data);
  persistCurrentRecord(rowIndex);
  ensureEditPanel(true);
}

async function callEditEntry(action, rowIndex, editKey, patch){
  var payload = {
    sheetName:'Records',
    rowIndex:Number(rowIndex),
    edit_key:String(editKey||'').trim(),
    action:String(action||'').trim()
  };
  if (action === 'update'){
    payload.patch = patch || {};
  }

  debugLog('callEditEntry payload', payload);

  try{
    var res;
    if (window.google && google.script && google.script.run){
      res = await new Promise(function(resolve, reject){
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .editEntry(payload);
      });
      debugLog('google.script.run editEntry res', res);
    }else{
      res = await postEditFallback(payload);
    }

    if(!res || !res.ok){
      showEditMessage(LABELS.fail + (res && res.error ? ' : ' + res.error : ''), false);
      return;
    }

    await reloadAndRender(rowIndex);

    if(action === 'update'){
      showEditMessage('保存して再読込しました。', true);
    }else if(action === 'delete'){
      showEditMessage('非表示にして再読込しました。', true);
    }else if(action === 'restore'){
      showEditMessage('再表示して再読込しました。', true);
    }else{
      showEditMessage(LABELS.ok, true);
    }
  }catch(e){
    debugLog('callEditEntry err', String(e));
    showEditMessage(LABELS.fail + ' : ' + (e && e.message ? e.message : String(e)), false);
  }
}

function ensureEditPanel(force){
  var host = document.getElementById('editPanel');
  if (!host) return;
  if (host.__ready && !force) return;

  host.innerHTML = ''
    + '<div class="lab">' + LABELS.editGuide + '</div>'
    + '<div class="row2">'
    + '  <div><div class="lab">BAND</div><input id="e_band" class="in" type="text"></div>'
    + '  <div><div class="lab">TRACK</div><input id="e_track" class="in" type="text"></div>'
    + '</div>'
    + '<div class="row2">'
    + '  <div><div class="lab">' + LABELS.genre + '</div><input id="e_genre" class="in" type="text" placeholder="Punk / Glam / ..."></div>'
    + '  <div><div class="lab">COUNTRY</div><input id="e_country" class="in" type="text" placeholder="Japan / USA / ..."></div>'
    + '</div>'
    + '<div class="row2">'
    + '  <div><div class="lab">' + LABELS.era + '</div><input id="e_release_year" class="in" type="text" placeholder="YYYY"></div>'
    + '  <div><div class="lab">' + LABELS.catalog + '</div><input id="e_catalog_no" class="in" type="text"></div>'
    + '</div>'
    + '<div><div class="lab">' + LABELS.format + '</div><input id="e_format" class="in" type="text" placeholder="7&quot;EP / LP / CD / ..."></div>'
    + '<div><div class="lab">DESCRIPTION</div><textarea id="e_description" class="in ta" maxlength="500"></textarea></div>'
    + '<div class="row2">'
    + '  <div><div class="lab">IMAGE URL</div><input id="e_image_url" class="in" type="url" placeholder="https://..."></div>'
    + '  <div><div class="lab">YOUTUBE URL</div><input id="e_youtube_url" class="in" type="url" placeholder="https://youtu.be/..."></div>'
    + '</div>'
    + '<div><div class="lab">' + LABELS.by + '</div><input id="e_author" class="in" type="text"></div>'
    + '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'
    + '  <button id="btnSave" class="btn secondary" type="button">' + LABELS.save + '</button>'
    + '</div>';

  var r = currentRecord || {};

  function setVal(id, v){
    var el = document.getElementById(id);
    if(el) el.value = String(v || '');
  }

  setVal('e_band', r.band);
  setVal('e_track', r.track);
  setVal('e_genre', r.genre);
  setVal('e_country', r.country);
  setVal('e_release_year', r.release_year);
  setVal('e_catalog_no', r.catalog_no);
  setVal('e_format', r.format);
  setVal('e_description', r.description);
  setVal('e_image_url', r.image_url);
  setVal('e_youtube_url', r.youtube_url);
  setVal('e_author', r.author);

  document.getElementById('btnSave').onclick = function(){
    var ek = (document.getElementById('editKey') || {}).value || '';
    ek = String(ek).trim();
    if(!ek){
      alert(LABELS.needKey);
      return;
    }

    var patch = {};

    function pick(key, id){
      var el = document.getElementById(id);
      var v = el ? String(el.value || '') : '';
      var cur = String(currentRecord[key] || '');
      if(v !== cur){
        patch[key] = v;
      }
    }

    pick('band', 'e_band');
    pick('track', 'e_track');
    pick('genre', 'e_genre');
    pick('country', 'e_country');
    pick('release_year', 'e_release_year');
    pick('catalog_no', 'e_catalog_no');
    pick('format', 'e_format');
    pick('description', 'e_description');
    pick('image_url', 'e_image_url');
    pick('youtube_url', 'e_youtube_url');
    pick('author', 'e_author');

    debugLog('edit patch', patch);

    if(Object.keys(patch).length === 0){
      showEditMessage('変更はありません。', true);
      return;
    }

    callEditEntry('update', currentRow, ek, patch);
  };

  host.__ready = true;
}

function attachPageHandlers(row){
  document.getElementById('reportBtn').onclick = function(){
    reportThis(row);
  };

  document.getElementById('btnEdit').onclick = function(){
    openEditPanel();
  };

  document.getElementById('btnHide').onclick = function(){
    var ek = String((document.getElementById('editKey').value || '')).trim();
    if(!ek){
      alert(LABELS.needKey);
      return;
    }
    callEditEntry('delete', row, ek);
  };

  document.getElementById('btnUnhide').onclick = function(){
    var ek = String((document.getElementById('editKey').value || '')).trim();
    if(!ek){
      alert(LABELS.needKey);
      return;
    }
    callEditEntry('restore', row, ek);
  };
}

(function(){
  setUI();

  function rowFromHref(){
    var m = (location.search || location.href).match(/[?&]row=(\d+)/);
    var n = m ? Number(m[1]) : 0;
    return (Number.isInteger(n) && n >= 2) ? n : 0;
  }

  function showError(msg){
    setAlertState(document.getElementById('msg'), msg, false);
  }

  async function start(row){
    currentRow = row;

    if(!row){
      showError('レコードID（row）が指定されていません。');
      return;
    }

    debugLog('start row', row);

    try{
      var cached = sessionStorage.getItem('cz_selected_record');
      if (cached){
        var rec = JSON.parse(cached);
        if (rec && String(rec.__row || rec.rowIndex || rec.id) === String(row)){
          debugLog('sessionStorage cached record', rec);
          render(rec);
        }
      }
    }catch(e){
      debugLog('sessionStorage err', String(e));
    }

    attachPageHandlers(row);

    try{
      if (window.google && google.script && google.script.run){
        google.script.run
          .withSuccessHandler(function(res){
            debugLog('google.script.run getRecordByRow res', res);
            if(!res || !res.ok){
              showError('読み込みに失敗しました。');
              return;
            }
            render(res.data || {});
            persistCurrentRecord(row);
          })
          .withFailureHandler(function(err){
            debugLog('google.script.run getRecordByRow err', String(err));
            showError('読み込みに失敗しました：' + (err && err.message ? err.message : String(err)));
          })
          .getRecordByRow({rowIndex:Number(row)});
        return;
      }
    }catch(e){
      debugLog('google.script.run init err', String(e));
    }

    try{
      var res = await fetchRecordByRow(row);
      if(!res || !res.ok){
        showError('読み込みに失敗しました。');
        return;
      }
      render(res.data || {});
      persistCurrentRecord(row);
    }catch(err){
      debugLog('start fallback err', String(err));
      showError('読み込みに失敗しました：' + (err && err.message ? err.message : 'Load failed'));
    }
  }

  start(rowFromHref());
})();
</script>
