<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CHAYNUPZINE 特集コラム投稿</title>
<style>
  :root{ --panel:rgba(255,255,255,.92); --ink:#222; --chip:#eef1f5; }
  html,body{
    height:100%; margin:0; background:#f3f5f7; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:20px; line-height:1.5;
  }
  *,*::before,*::after{ box-sizing:border-box; }

  .bg{
    position:fixed; inset:0; background-size:cover; background-position:center;
    filter:brightness(.88); z-index:0;
    background-color:#f3f5f7;
    background-image:url("https://etramone7-coder.github.io/chaynupzine/assets/bg_submit_feauture.webp");
  }
  .wrap{max-width:1100px; margin:28px auto; padding:0 16px;}
  .panel{
    background:var(--panel); backdrop-filter:saturate(120%) blur(10px);
    border-radius:16px; box-shadow:0 10px 28px rgba(0,0,0,.16);
    padding:20px; min-height:860px;
    position:relative; z-index:1;
  }

  .topbar{
    display:grid;
    grid-template-columns:1fr;
    align-items:start;
    gap:12px;
    margin-bottom:10px;
  }
  .brand{
    display:inline-block; background:#111; color:#fff; border-radius:8px;
    padding:7px 12px; font-weight:800; letter-spacing:.4px;
  }
  .titleline{display:flex; align-items:center; gap:12px}
  .sub{font-size:16px; color:#555; overflow-wrap:anywhere;}

  .formgrid{display:grid; gap:16px;}
  @media(min-width:1040px){ .formgrid{grid-template-columns: 1fr 380px;} }

  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-weight:800; font-size:18px;}
  .input, select, textarea{
    font-size:18px; padding:12px 14px; border-radius:12px; border:1px solid #dcdcdc;
    background:#fff; color:#222; outline:none; width:100%; max-width:100%;
  }
  textarea{min-height:140px; resize:vertical;}
  .row2{display:grid; gap:12px;}
  @media(min-width:640px){ .row2{grid-template-columns:1fr 1fr;} }

  .help{font-size:14px; color:#666; overflow-wrap:anywhere;}
  .consent{margin-top:10px; font-size:14px; color:#333; overflow-wrap:anywhere;}

  .actions{display:flex; gap:12px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap;}
  .btn{
    border:0; border-radius:14px; padding:12px 16px; font-size:18px;
    font-weight:800; cursor:pointer;
  }
  .btn.primary{background:#111; color:#fff;}
  .btn.ghost{background:#fff; color:#111; border:1px solid #ddd;}
  .btn[disabled]{opacity:.6; cursor:progress;}

  .alert{
    margin:12px 0; padding:12px; border-radius:14px; background:#ffe9e9;
    color:#a33; border:1px solid #f6bcbc; font-size:16px; display:none; overflow-wrap:anywhere;
  }
  .alert.ok{background:#eefcf1; color:#0a7a32; border-color:#c6ecd1; display:block;}
  .alert.err{display:block;}

  .preview{
    background:#fff; border:1px solid #eee; border-radius:16px; padding:16px;
  }
  .pvtitle{font-weight:900; font-size:22px; text-align:center;}
  .pvmeta{font-size:16px; color:#555; text-align:center; margin-top:4px;}
  .pvdesc{font-size:16px; color:#333; margin-top:12px; white-space:pre-wrap; overflow-wrap:anywhere;}
  .sectionpv{
    border-top:1px dashed #ddd;
    margin-top:14px;
    padding-top:14px;
  }
  .sectionttl{
    font-size:14px; font-weight:800; color:#444; margin-bottom:8px;
  }
  .thumbs{
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px;
  }
  .thumbs img{
    width:100%; height:110px; object-fit:cover; border-radius:10px; background:#f5f5f5; display:block;
  }
  .ytlink{margin-top:8px; font-size:14px;}
  .ytlink a{color:#2E66CC; text-decoration:none;}

  .hiddenfile{position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;}
  .filebtn{
    display:inline-block; padding:12px 14px; border:1px solid #dcdcdc;
    border-radius:12px; background:#fff; color:#222; font-size:16px; cursor:pointer;
    text-align:center; width:100%;
  }
  .warn{color:#a33; font-size:13px; margin-top:4px;}
</style>
</head>
<body>
<div id="bg" class="bg"></div>

<div class="wrap">
  <div class="panel">
    <div class="topbar">
      <div class="titleline">
        <span class="brand">CHAYNUPZINE</span>
        <span class="sub" id="t-form-title">投稿フォーム（特集コラム）</span>
      </div>
    </div>

    <p class="sub" id="t-help">
      NGワードは自動検知。画像は <b>1枚 10MB以下 / 長辺 3000px以下</b> を推奨。編集は投稿後に browse 側から同じ <b>edit_key</b> を使って行います。
    </p>

    <div class="formgrid">
      <form id="postForm" novalidate>
        <div class="row2">
          <div class="field">
            <label for="genre">GENRE（必須）</label>
            <select id="genre" name="genre" required>
              <option value="">選択してください</option>
              <option value="band">BAND（バンド）</option>
              <option value="label">LABEL（レーベル）</option>
              <option value="region">REGION（国・地域）</option>
              <option value="designer">DESIGNER（デザイナー）</option>
              <option value="person">PERSON（有名人）</option>
              <option value="venue">VENUE（ライブ会場）</option>
              <option value="movie">MOVIE（映画）</option>
              <option value="fanzine">FANZINE（ファンジン）</option>
              <option value="other">OTHER（その他）</option>
            </select>
          </div>

          <div class="field" id="genreOtherWrap" style="display:none">
            <label for="genre_other">GENRE（OTHER の場合）</label>
            <input id="genre_other" name="genre_other" class="input" placeholder="自由入力" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="era">ERA（年代・任意）</label>
            <select id="era" name="era">
              <option value="">指定なし</option>
              <option>1950s</option><option>1960s</option><option>1970s</option>
              <option>1980s</option><option>1990s</option><option>2000s</option>
              <option>2010s</option><option>2020s</option>
            </select>
          </div>

          <div class="field">
            <label for="regionSel">REGION（任意）</label>
            <div class="row2" style="grid-template-columns:2fr 1fr;">
              <select id="regionSel" name="regionSel">
                <option value="">指定なし</option>
                <option>Japan</option><option>UK</option><option>US</option>
                <option>Germany</option><option>France</option><option>Italy</option>
                <option>Spain</option><option>Australia</option><option>Canada</option>
                <option>Sweden</option><option>Norway</option><option>Finland</option>
                <option>Netherlands</option><option>Belgium</option><option>Ireland</option>
                <option>New Zealand</option><option>Korea</option><option>China</option>
                <option>Taiwan</option><option>Hong Kong</option>
                <option>Brazil</option><option>Mexico</option>
                <option value="__other">Other…</option>
              </select>
              <input id="regionOther" class="input" type="text" placeholder="地域名を入力" style="display:none" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="title">TITLE（必須）</label>
          <input id="title" name="title" class="input" placeholder="特集のタイトル" required />
        </div>

        <div class="field">
          <label for="author">AUTHOR（必須）</label>
          <input id="author" name="author" class="input" placeholder="投稿者名" required />
        </div>

        <div class="field">
          <label for="edit_key">EDIT KEY（編集キー・必須）</label>
          <input id="edit_key" name="edit_key" class="input"
            placeholder="半角英数字 8〜32 文字。browse 側の編集・削除時に必要"
            minlength="8" maxlength="32" pattern="[A-Za-z0-9]{8,32}" inputmode="latin" required />
          <div class="help">編集キーは <b>半角英数字のみ・8〜32文字</b> を入力してください。</div>
        </div>

        <div id="paras"></div>

        <div class="consent">
          <p id="t-disclaimer">
            ※免責事項：誹謗中傷・差別的表現・個人情報の投稿は禁止です。投稿内容は公開される可能性があります。運営は一切の責任を負いません。
          </p>
          <label><input type="checkbox" id="consentCheck"> <span id="t-agree">上記免責事項に同意します</span></label>
        </div>

        <div class="actions">
          <a class="btn ghost" id="btn-back-search" href="https://etramone7-coder.github.io/chaynupzine/search_features.html" target="_top" rel="noopener noreferrer">検索へ戻る</a>
          <a class="btn ghost" id="btn-home" href="https://etramone7-coder.github.io/chaynupzine/" target="_top" rel="noopener noreferrer">トップへ戻る</a>
          <button class="btn primary" type="button" id="submitBtn">投稿</button>
        </div>

        <div id="msg" class="alert"></div>
      </form>

      <aside class="preview" id="preview">
        <div class="pvtitle" id="pvTitle">TITLE</div>
        <div class="pvmeta" id="pvMeta">GENRE / ERA / REGION / AUTHOR</div>
        <div class="pvdesc" id="pvLead">（特集内容のプレビューがここに反映されます）</div>
        <div id="pvSections"></div>
      </aside>
    </div>
  </div>
</div>

<script>
const EXEC_URL = 'https://script.google.com/macros/s/AKfycbxZ9JsvX-BQUrFXLTBSkf9i_MgWxt-fyQygLDQfi2DQWy3qZ7dtc_IObvi3VMYoaCQAxw/exec';

async function callSubmitFeature(payload, onOK, onNG){
  try{
    if (window.google && google.script && google.script.run){
      google.script.run.withSuccessHandler(onOK).withFailureHandler(onNG).submitFeature(payload);
      return;
    }
  }catch(_){}
  try{
    const url = EXEC_URL + (EXEC_URL.indexOf('?')>=0?'&':'?') + 'v=' + Date.now();
    const r = await fetch(url, {
      method:'POST',
      mode:'cors',
      cache:'no-store',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ fn:'submitFeature', payload, csrf:(window.__CZ_CSRF||'') })
    });
    if(!r.ok){ const t = await r.text().catch(()=> ''); throw new Error('HTTP '+r.status+' '+t); }
    onOK(await r.json());
  }catch(err){
    onNG(err);
  }
}
</script>

<script>
(function(){
  var url = 'https://etramone7-coder.github.io/chaynupzine/assets/bg_submit_feauture.webp';
  document.getElementById('bg').style.backgroundImage = 'url(' + url + ')';
})();

function getClientId(){
  try{
    var k='chaynupzine_cid';
    var id=localStorage.getItem(k);
    if(!id){
      id = 'cid_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
      localStorage.setItem(k,id);
    }
    return id;
  }catch(_){ return ''; }
}

function isHttpsUrl(u){
  if(!u) return false;
  try{ var x=new URL(u.trim()); return x.protocol==='https:'; }catch(_){ return false; }
}
function isAllowedYouTube(u){
  if(!u) return true;
  try{
    var s=u.trim();
    if(/^https:\/\/youtu\.be\/[\w-]{6,}/i.test(s)) return true;
    if(/^https:\/\/(www\.)?youtube\.com\/watch\?/.test(s) && /[?&]v=([\w-]{6,})/.test(s)) return true;
    if(/^https:\/\/(www\.)?youtube\.com\/shorts\/[\w-]{6,}/i.test(s)) return true;
    return false;
  }catch(_){ return false; }
}
function isAllowedImageUrl(u){
  if(!u) return true;
  if(!isHttpsUrl(u)) return false;
  return true;
}

var NG_TERMS = ["kill","die","rape","suicide","terror","bomb","fuck","cunt","asshole","nazi","kkk","white power","retard","spic","chink","gook","fag"];

function extractDriveId(u){
  try{
    var s=String(u||'');
    var m=s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if(m) return m[1];
    m=s.match(/[?&]id=([a-zA-Z0-9_-]+)/); if(m) return m[1];
    m=s.match(/uc\?export=view&id=([a-zA-Z0-9_-]+)/); if(m) return m[1];
  }catch(e){}
  return '';
}
function normalizeDriveUrl(url){
  try{
    if(!url) return '';
    var m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if(m) return 'https://drive.google.com/uc?export=view&id='+m[1];
    m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/); if(m) return 'https://drive.google.com/uc?export=view&id='+m[1];
    return url;
  }catch(_){ return url; }
}
function buildImageSources(url){
  var arr=[]; if(!url) return arr;
  if(String(url).indexOf('images.unsplash.com')>=0){
    arr.push(url + (url.indexOf('?')>=0 ? '&w=600' : '?w=600')); return arr;
  }
  var id=extractDriveId(url);
  if(id){
    arr.push('https://drive.google.com/uc?export=view&id='+id);
    arr.push('https://drive.google.com/thumbnail?id='+id+'&sz=w600');
  }
  arr.push(url); return arr;
}
function setPreviewImageByUrl(box, url){
  box.innerHTML='';
  var sources=buildImageSources(url);
  if(!sources.length){ return; }
  var img=new Image(); img.loading='lazy';
  var i=0;
  function next(){
    if(i>=sources.length){ box.textContent='no image'; return; }
    img.src=sources[i++];
  }
  img.onerror=next;
  next();
  box.appendChild(img);
}

function getRegionValue(){
  var sel=document.getElementById('regionSel').value;
  if(sel === '__other') return (document.getElementById('regionOther').value||'').trim();
  return sel || '';
}

function refreshPv(){
  var title=document.getElementById('title').value|| '(TITLE)';
  var genre=document.getElementById('genre').value||'-';
  var era=document.getElementById('era').value||'-';
  var region=getRegionValue()||'-';
  var author=document.getElementById('author').value||'-';

  document.getElementById('pvTitle').textContent = title;
  document.getElementById('pvMeta').textContent  = genre + ' / ' + era + ' / ' + region + ' / ' + author;

  var lead = '';
  for(var i=1;i<=5;i++){
    var t=(document.getElementById('para'+i+'_text')||{}).value||'';
    if(t.trim()){ lead=t.trim(); break; }
  }
  document.getElementById('pvLead').textContent = lead || '（特集内容のプレビューがここに反映されます）';

  var host = document.getElementById('pvSections');
  host.innerHTML = '';

  for(var i=1;i<=5;i++){
    var text = (document.getElementById('para'+i+'_text')||{}).value || '';
    var yt   = (document.getElementById('youtube'+i)||{}).value || '';
    var imgs = [];
    for(var j=1;j<=3;j++){
      var u = (document.getElementById('p'+i+'_img'+j+'_url')||{}).value || '';
      if(u.trim()) imgs.push(u.trim());
    }
    if(!text.trim() && !imgs.length && !yt.trim()) continue;

    var box = document.createElement('div');
    box.className = 'sectionpv';

    var ttl = document.createElement('div');
    ttl.className = 'sectionttl';
    ttl.textContent = '§' + i;
    box.appendChild(ttl);

    if(text.trim()){
      var p = document.createElement('div');
      p.className = 'pvdesc';
      p.style.marginTop = '0';
      p.textContent = text.trim();
      box.appendChild(p);
    }

    if(imgs.length){
      var thumbs = document.createElement('div');
      thumbs.className = 'thumbs';
      imgs.forEach(function(u){
        var wrap = document.createElement('div');
        setPreviewImageByUrl(wrap, normalizeDriveUrl(u));
        thumbs.appendChild(wrap);
      });
      box.appendChild(thumbs);
    }

    if(yt.trim()){
      var y = document.createElement('div');
      y.className = 'ytlink';
      y.innerHTML = '<a href="'+ yt.trim() +'" target="_blank" rel="noopener">YouTubeリンクを開く</a>';
      box.appendChild(y);
    }

    host.appendChild(box);
  }
}

function toResizedDataURL(file, maxDim=1600){
  return new Promise((resolve,reject)=>{
    try{
      const img = new Image();
      const fr  = new FileReader();
      fr.onload = e=>{
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if (Math.max(w,h) > maxDim){
            const scale = maxDim / Math.max(w,h);
            w = Math.round(w*scale); h = Math.round(h*scale);
          }
          const cv = document.createElement('canvas');
          cv.width = w; cv.height = h;
          const cx = cv.getContext('2d');
          cx.imageSmoothingEnabled = true;
          cx.imageSmoothingQuality = 'high';
          cx.drawImage(img,0,0,w,h);
          resolve(cv.toDataURL('image/jpeg', 0.88));
        };
        img.onerror = ()=>reject(new Error('image load error'));
        img.src = e.target.result;
      };
      fr.onerror = ()=>reject(new Error('read error'));
      fr.readAsDataURL(file);
    }catch(e){ reject(e); }
  });
}

function buildParas(){
  var host = document.getElementById('paras');
  host.innerHTML='';
  for(let i=1;i<=5;i++){
    var box = document.createElement('div');
    box.style.borderTop = '1px dashed #ddd';
    box.style.paddingTop = '14px';
    box.style.marginTop = '14px';

    var hd = document.createElement('div');
    hd.style.fontWeight='800';
    hd.style.marginBottom='8px';
    hd.textContent = '§' + i;
    box.appendChild(hd);

    var f1 = document.createElement('div');
    f1.className='field';
    f1.innerHTML = '<label for="para'+i+'_text">本文</label><textarea id="para'+i+'_text" class="input" placeholder="本文を入力"></textarea>';
    box.appendChild(f1);

    for(let j=1;j<=3;j++){
      var row = document.createElement('div');
      row.className = 'row2';
      row.style.marginTop = '10px';

      var urlField = document.createElement('div');
      urlField.className = 'field';
      urlField.innerHTML =
        '<label for="p'+i+'_img'+j+'_url">画像URL ' + j + '（任意）</label>' +
        '<input id="p'+i+'_img'+j+'_url" class="input" placeholder="https://drive.google.com/... or https://example.com/...">' +
        '<div class="warn" id="p'+i+'_img'+j+'_warn"></div>';
      row.appendChild(urlField);

      var fileField = document.createElement('div');
      fileField.className = 'field';
      fileField.innerHTML =
        '<label>UPLOAD IMAGE ' + j + '（任意）</label>' +
        '<button type="button" class="filebtn" data-for="p'+i+'_img'+j+'_file">ファイルを選択</button>' +
        '<input id="p'+i+'_img'+j+'_file" type="file" accept="image/*" class="hiddenfile">';
      row.appendChild(fileField);

      box.appendChild(row);
    }

    var yf = document.createElement('div');
    yf.className='field';
    yf.style.marginTop='10px';
    yf.innerHTML = '<label for="youtube'+i+'">YOUTUBE URL（任意）</label><input id="youtube'+i+'" class="input" placeholder="https://youtu.be/... または https://www.youtube.com/watch?v=xxxxx">';
    box.appendChild(yf);

    host.appendChild(box);
  }

  document.querySelectorAll('.filebtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.getAttribute('data-for');
      var input = document.getElementById(id);
      if(input) input.click();
    });
  });

  document.querySelectorAll('input[type=file]').forEach(function(input){
    input.addEventListener('change', function(){
      var btn = document.querySelector('.filebtn[data-for="'+ input.id +'"]');
      if(btn){
        btn.textContent = (input.files && input.files[0]) ? ('選択済み: ' + input.files[0].name) : 'ファイルを選択';
      }
      refreshPv();
    });
  });
}

buildParas();

['genre','genre_other','era','regionSel','regionOther','title','author','edit_key'].forEach(function(id){
  var el=document.getElementById(id);
  if(el) el.addEventListener('input', refreshPv);
  if(el) el.addEventListener('change', refreshPv);
});
document.getElementById('genre').addEventListener('change', function(){
  document.getElementById('genreOtherWrap').style.display = (this.value === 'other') ? '' : 'none';
});
document.getElementById('regionSel').addEventListener('change', function(){
  var show = (this.value === '__other');
  document.getElementById('regionOther').style.display = show ? '' : 'none';
  if(!show) document.getElementById('regionOther').value = '';
  refreshPv();
});

for(let i=1;i<=5;i++){
  document.getElementById('para'+i+'_text').addEventListener('input', refreshPv);
  document.getElementById('youtube'+i).addEventListener('input', refreshPv);
  for(let j=1;j<=3;j++){
    document.getElementById('p'+i+'_img'+j+'_url').addEventListener('input', refreshPv);
  }
}

document.getElementById('submitBtn').addEventListener('click', async function(){
  var msg=document.getElementById('msg');
  var btn=document.getElementById('submitBtn');
  msg.className='alert'; msg.textContent='送信準備中…';

  if(!document.getElementById('consentCheck').checked){
    msg.className='alert err'; msg.textContent='免責事項に同意してください。'; return;
  }

  var genre = (document.getElementById('genre').value||'').trim();
  var title = (document.getElementById('title').value||'').trim();
  var author = (document.getElementById('author').value||'').trim();
  var ek = (document.getElementById('edit_key').value||'').trim();

  if(!genre || !title || !author || !ek){
    msg.className='alert err'; msg.textContent='未入力の必須項目があります。'; return;
  }
  if(genre === 'other' && !(document.getElementById('genre_other').value||'').trim()){
    msg.className='alert err'; msg.textContent='GENRE が OTHER の場合は自由入力も必須です。'; return;
  }

  if(ek.length < 8 || ek.length > 32 || !/^[A-Za-z0-9]{8,32}$/.test(ek)){
    msg.className='alert err'; msg.textContent='編集キーは半角英数字のみ・8〜32文字で入力してください。'; return;
  }

  var ngText = [
    author,
    document.getElementById('era').value || '',
    getRegionValue()
  ];
  for(let i=1;i<=5;i++){
    ngText.push((document.getElementById('para'+i+'_text').value||'').trim());
  }
  var low = ngText.join('\n').toLowerCase();
  for(var k=0;k<NG_TERMS.length;k++){
    if(low.indexOf(NG_TERMS[k])>=0){
      msg.className='alert err'; msg.textContent='禁止ワードが含まれています。'; return;
    }
  }

  for(let i=1;i<=5;i++){
    var yraw = (document.getElementById('youtube'+i).value||'').trim();
    if(yraw && !isAllowedYouTube(yraw)){
      msg.className='alert err'; msg.textContent='YouTubeのURL形式が不正です（§'+i+'）。'; return;
    }
    for(let j=1;j<=3;j++){
      var u = (document.getElementById('p'+i+'_img'+j+'_url').value||'').trim();
      if(u && !isAllowedImageUrl(u)){
        msg.className='alert err'; msg.textContent='画像URLの形式が不正です（§'+i+' / 画像'+j+'）。'; return;
      }
    }
  }

  var payload = {
    status:'published',
    title:title,
    author:author,
    genre:genre,
    genre_other:(document.getElementById('genre_other').value||'').trim(),
    era:(document.getElementById('era').value||'').trim(),
    region:getRegionValue(),
    edit_key:ek,
    client_id:getClientId()
  };

  try{
    const imgTasks = [];

    for(let i=1;i<=5;i++){
      payload['para'+i+'_text'] = (document.getElementById('para'+i+'_text').value||'').trim();
      payload['youtube'+i] = (document.getElementById('youtube'+i).value||'').trim();

      for(let j=1;j<=3;j++){
        let rawUrl = (document.getElementById('p'+i+'_img'+j+'_url').value||'').trim();
        if(rawUrl) rawUrl = normalizeDriveUrl(rawUrl);
        payload['p'+i+'_img'+j+'_url'] = rawUrl;

        var file = document.getElementById('p'+i+'_img'+j+'_file').files[0];
        if(!payload['p'+i+'_img'+j+'_url'] && file){
          imgTasks.push((async function(ii,jj,ff){
            payload['p'+ii+'_img'+jj+'_data'] = await toResizedDataURL(ff, 1600);
          })(i,j,file));
        }
      }
    }

    await Promise.all(imgTasks);

    btn.disabled=true;
    callSubmitFeature(
      payload,
      function(res){
        if(res && res.ok){
          msg.className='alert ok';
          msg.textContent='投稿しました。ありがとうございます！';

          var keep = { edit_key: document.getElementById('edit_key').value };

          document.getElementById('postForm').reset();
          buildParas();
          document.getElementById('edit_key').value = keep.edit_key;
          document.getElementById('genreOtherWrap').style.display = 'none';
          document.getElementById('regionOther').style.display = 'none';
          refreshPv();
        }else{
          msg.className='alert err';
          msg.textContent='投稿に失敗しました: ' + (res && res.error || 'unknown');
        }
        btn.disabled=false;
      },
      function(err){
        msg.className='alert err';
        msg.textContent='投稿に失敗しました: ' + (err && err.message ? err.message : String(err));
        btn.disabled=false;
      }
    );
  }catch(e){
    msg.className='alert err';
    msg.textContent='投稿に失敗しました: ' + (e && e.message ? e.message : String(e));
  }
});

refreshPv();
</script>
</body>
</html>
